<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Classic Snake</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hud">
        <h1>Snake</h1>
        <p>Score: <span id="score">0</span></p>
      </header>

      <section id="game-board" class="board" aria-label="Snake game board"></section>

      <section class="controls">
        <div class="row">
          <button data-dir="up" aria-label="Move up">↑</button>
        </div>
        <div class="row">
          <button data-dir="left" aria-label="Move left">←</button>
          <button data-dir="down" aria-label="Move down">↓</button>
          <button data-dir="right" aria-label="Move right">→</button>
        </div>
      </section>

      <section class="actions">
        <button id="start">Start</button>
        <button id="pause">Pause</button>
        <button id="restart">Restart</button>
      </section>

      <p id="status" role="status">Press Start to play. Use arrow keys or WASD.</p>
    </main>

    <script type="module" src="src/main.mjs"></script>
  </body>
</html>
